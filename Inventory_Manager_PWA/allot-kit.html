<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Allot Kit (Step 3)</title>
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/quick-allot.css">
</head>
<body>

    <main class="app-container quick-allot-container">
        <header class="top-header">
            <div class="header-left"><div class="header-logo"><a href="im-dashboard.html"><img src="assets/small-logo.svg" alt="Logo" class="logo-img"> <span class="logo-text">IM</span></a></div></div>
            <div class="header-right"><img src="assets/bell-icon.svg" alt="Notifications" class="icon-sm" onclick="window.location.href='im-alerts.html'"></div>
        </header>

        <div class="page-content">
            <div class="stepper-wrapper">
                <div class="stepper-track"><div class="stepper-fill" style="width: 100%;"></div></div>
                <div class="stepper-nodes">
                    <div class="step-node active">1</div>
                    <div class="step-node active">2</div>
                    <div class="step-node active">3</div>
                </div>
            </div>

            <div class="sub-header-left">
                <div class="back-btn-orange" onclick="window.location.href='create-kit.html'">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </div>
                <h1 class="page-title">Allot Kit</h1>
            </div>

            <form class="allotment-form">
                <div class="input-group">
                    <select class="custom-input select-input" id="workstation-select">
                        <option value="" disabled selected>Select Workstation / Assembly</option>
                    </select>
                </div>

                <div class="input-group">
                    <select class="custom-input select-input" id="operator-select">
                        <option value="" disabled selected>Select Operator</option>
                    </select>
                </div>

                <button type="button" class="btn-primary center-btn" id="confirm-allot-btn">Confirm</button>
            </form>
            <div style="height: 100px;"></div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='im-dashboard.html'"><img src="assets/home-icon.svg" alt="Home"></div>
            <div class="nav-item active" onclick="window.location.href='quick-allot.html'"><img src="assets/nav-quick-allot.svg" alt="Quick Allot" style="filter: brightness(0) invert(1);"></div>
            <div class="nav-item" onclick="window.location.href='scanned-product.html'"><img src="assets/nav-scan-box.svg" alt="Scan"></div>
            <div class="nav-item" onclick="window.location.href='inventory.html'"><img src="assets/nav-inventory.svg" alt="Inventory"></div>
        </nav>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="js/core.js"></script>
    <script src="js/pages/allot-kit.js"></script>
    <script>
        function confirmAllot() {
            alert("Kit Allotted Successfully!");
            window.location.href = 'im-dashboard.html';
        }
    </script>
</body>
</html>
