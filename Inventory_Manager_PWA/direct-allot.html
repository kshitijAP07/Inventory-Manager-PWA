<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Direct Allot</title>
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/quick-allot.css">
</head>
<body>
    <main class="app-container quick-allot-container">
        <header class="top-header">
            <div class="header-left"><div class="header-logo"><a href="im-dashboard.html"><img src="assets/small-logo.svg" alt="Logo" class="logo-img"> <span class="logo-text">IM</span></a></div></div>
            <div class="header-right"><img src="assets/bell-icon.svg" alt="Notifications" class="icon-sm" onclick="window.location.href='im-alerts.html'"></div>
        </header>

        <div class="page-content">
            <div class="sub-header-left" style="margin-top: 24px;">
                <div class="back-btn-orange" onclick="window.history.back()">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </div>
                <h1 class="page-title" id="direct-title">Allot to...</h1>
            </div>

            <form class="allotment-form">
                <div class="input-group">
                    <select class="custom-input select-input" id="material-select">
                        <option value="" disabled selected>Loading Materials...</option>
                    </select>
                </div>

                <div class="kit-item-group" id="manual-input-group" style="margin-bottom: 24px;">
                    <div class="kit-item-inputs">
                        <input type="number" class="custom-input input-qty" id="manual-qty" placeholder="Quantity">
                        <select class="custom-input select-input input-units" id="manual-unit">
                            <option value="units" selected>Units</option>
                            <option value="kg">Kg</option>
                        </select>
                    </div>
                </div>

                <div class="scan-prompt">
                    <p>To add more material scan or add manually</p>
                    <a href="#" id="scan-link" class="scan-link">Scan QR Label</a>
                </div>

                <div class="kit-items-list" id="kit-items-list">
                    <div id="scanned-item-container" style="display: none;" class="kit-item-group">
                        <div class="kit-item-pill">
                            <span class="kit-item-name" id="scanned-data-text">...</span>
                            <span class="remove-kit-item" onclick="document.getElementById('scanned-item-container').style.display='none'">&times;</span>
                        </div>
                        <div class="kit-item-inputs">
                            <input type="number" class="custom-input input-qty" id="scanned-qty" placeholder="Quantity">
                            <select class="custom-input select-input input-units" id="scanned-unit">
                                <option value="units" selected>Units</option>
                                <option value="kg">Kg</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-primary center-btn" id="confirm-btn">Confirm Allotment</button>
            </form>
            <div style="height: 100px;"></div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="window.location.href='im-dashboard.html'"><img src="assets/home-icon.svg" alt="Home" style="filter: brightness(0) invert(1);"></div>
            <div class="nav-item" onclick="window.location.href='quick-allot.html'"><img src="assets/nav-quick-allot.svg" alt="Quick Allot"></div>
            <div class="nav-item" onclick="window.location.href='scanned-product.html'"><img src="assets/nav-scan-box.svg" alt="Scan"></div>
            <div class="nav-item" onclick="window.location.href='inventory.html'"><img src="assets/nav-inventory.svg" alt="Inventory"></div>
        </nav>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="js/core.js"></script>
    <script src="js/pages/direct-allot.js"></script>
</body>
</html>
