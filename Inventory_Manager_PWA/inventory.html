<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Inventory</title>
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/inventory.css">
</head>
<body>
    <main class="app-container inventory-container">
        
        <header class="top-header">
            <div class="header-left">
                <div class="header-logo">
                    <a href="im-dashboard.html">
                        <img src="assets/small-logo.svg" alt="Logo" class="logo-img"> 
                        <span class="logo-text">IM</span>
                    </a>
                </div>
            </div>
            <div class="header-right">
                <img src="assets/bell-icon.svg" alt="Notifications" class="icon-sm" onclick="window.location.href='im-alerts.html'">
            </div>
        </header>

        <div class="page-content">
            <div class="toggle-wrapper">
                <div class="toggle-container">
                    <button class="toggle-btn active" id="btn-location" onclick="switchTab('location')">Location</button>
                    <button class="toggle-btn" id="btn-stock" onclick="switchTab('stock')">Stock Inventory</button>
                </div>
            </div>

            <h1 class="page-title" id="inventory-title">Check Location</h1>

            <div class="search-bar-row">
                <div class="search-input-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Search Material, Batch, or Location">
                    <svg class="clear-icon" id="clear-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer; display: none;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
                <button class="filter-btn-square" id="toggle-advanced-filters">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
                </button>
            </div>

            <!-- Advanced Filters Panel (Hidden by default) -->
            <div id="advanced-filters-panel" style="display: none; background: #F9F9F9; padding: 16px; border-radius: 12px; margin-bottom: 16px; gap: 12px; flex-direction: column;">
                <select id="filter-category" class="custom-input select-input">
                    <option value="all">All Material Types</option>
                    <!-- Dynamically Populated -->
                </select>
                <select id="filter-status" class="custom-input select-input">
                    <option value="all">All Stock Levels</option>
                    <option value="issue">Low / Critical / Out of Stock</option>
                    <option value="adequate">Adequate Stock</option>
                </select>
                <select id="sort-by" class="custom-input select-input">
                    <option value="name_asc">Name (A-Z)</option>
                    <option value="recent">Recently Added First</option>
                    <option value="qty_low">Quantity (Low to High)</option>
                </select>
            </div>

            <!-- Quick Filter Pills -->
            <div class="active-filters" id="quick-filters" style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 8px;">
                <div class="filter-pill-orange active" data-filter="all" style="cursor: pointer;">All Material</div>
                <div class="filter-pill-orange" data-filter="low_stock" style="cursor: pointer; background: #FFF; color: var(--color-primary); border: 1px solid var(--color-primary);">Needs Attention</div>
            </div>

            <div id="view-location" style="display: grid;" class="location-grid"></div>
            <div id="view-stock" style="display: none;" class="stock-list"></div>

            <div class="footer-copy">IM@2026</div>
            <div style="height: 100px;"></div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='im-dashboard.html'"><img src="assets/home-icon.svg" alt="Home"></div>
            <div class="nav-item" onclick="window.location.href='quick-allot.html'"><img src="assets/nav-quick-allot.svg" alt="Quick Allot"></div>
            <div class="nav-item" onclick="window.location.href='scanned-product.html'"><img src="assets/nav-scan-box.svg" alt="Scan"></div>
            <div class="nav-item active" onclick="window.location.href='inventory.html'">
                <img src="assets/nav-inventory.svg" alt="Inventory" style="filter: brightness(0) invert(1);">
            </div>
        </nav>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="js/core.js"></script>
    <script src="js/pages/inventory.js"></script>
</body>
</html>
