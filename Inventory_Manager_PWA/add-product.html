<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Add Product</title>
    
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/add-product.css">
</head>
<body>

    <main class="app-container add-product-container">
        <header class="top-header">
            <div class="header-left">
                <div class="header-logo">
                    <a href="im-dashboard.html">
                        <img src="assets/small-logo.svg" alt="Logo" class="logo-img"> 
                        <span class="logo-text">IM</span>
                    </a>
                </div>
            </div>
            <div class="header-right">
                <img src="assets/bell-icon.svg" alt="Notifications" class="icon-sm" onclick="window.location.href='im-alerts.html'">
            </div>
        </header>

        <div class="page-content">
            <div class="sub-header">
                <div class="back-btn" onclick="window.history.back()">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </div>
                <h1 class="page-title" id="page-title">Add Manually</h1>
            </div>

            <form class="product-form">
                
                <div id="scanned-pill-container" style="display: none;">
                    <div class="scanned-pill" id="scanned-data-text">
                        Neodymium Magnets N52 — MGNM
                    </div>
                </div>

                <div id="manual-inputs-container">
                    <input type="text" id="add-material-name" class="custom-input" placeholder="Enter Material Name">
                </div>
                <input type="text" id="add-batch-number" class="custom-input" placeholder="Batch Number">
                
                <input type="text" id="manual-qr-field" class="custom-input" placeholder="QR Code Number (If it's there)">

                <select id="add-category" class="custom-input select-input">
                    <option value="" disabled selected>Category</option>
                    <option value="Acoustic Material">Acoustic Material</option>
                    <option value="Hardware">Hardware</option>
                    <option value="Electronics">Electronics</option>
                </select>

                <div class="input-row">
                    <input type="number" class="custom-input input-qty" placeholder="Quantity">
                    <select class="custom-input select-input input-units">
                        <option value="units" selected>Units</option>
                        <option value="kg">Kg</option>
                        <option value="pcs">Pcs</option>
                    </select>
                </div>

                <div class="stepper-row">
                    <div class="stepper-btn minus">-</div>
                    <input type="number" class="custom-input text-center" placeholder="Min threshold">
                    <div class="stepper-btn plus">+</div>
                </div>

                <div class="stepper-row">
                    <div class="stepper-btn minus">-</div>
                    <input type="number" class="custom-input text-center" placeholder="Max Capacity">
                    <div class="stepper-btn plus">+</div>
                </div>

                <input type="text" id="add-supplier-name" class="custom-input" placeholder="Supplier Name">
                
                <div class="input-row-half">
                    <input type="text" id="add-supplier-city" class="custom-input" placeholder="Supplier City">
                    <input type="text" id="add-supplier-phone" class="custom-input" placeholder="Phone Number">
                </div>

                <input type="email" id="add-supplier-email" class="custom-input" placeholder="Supplier E-Mail">

                <textarea id="add-storage-notes" class="custom-input textarea-input" placeholder="Storage & Handling Note" rows="3"></textarea>

                <button type="button" class="btn-primary center-btn">Proceed to Storage Scan</button>
            </form>

            <div class="footer-copy">IM@2026</div>
            <div style="height: 100px;"></div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='im-dashboard.html'"><img src="assets/home-icon.svg" alt="Home"></div>
            <div class="nav-item" onclick="window.location.href='quick-allot.html'"><img src="assets/nav-quick-allot.svg" alt="Quick Allot"></div>
            
            <div class="nav-item active" onclick="window.location.href='scanned-product.html'">
                <img src="assets/nav-scan-box.svg" alt="Scan" style="filter: brightness(0) invert(1);">
            </div>
            
            <div class="nav-item" onclick="window.location.href='inventory.html'"><img src="assets/nav-inventory.svg" alt="Inventory"></div>
        </nav>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="js/core.js"></script>
    <script src="js/pages/add-product.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode'); 
            const data = urlParams.get('data'); 

            if (mode === 'scanned') {
                document.getElementById('page-title').innerText = "Scanned Item";
                document.getElementById('manual-inputs-container').style.display = 'none';
                document.getElementById('manual-qr-field').style.display = 'none';
                document.getElementById('scanned-pill-container').style.display = 'block';

                if (data) {
                    try {
                        // 1. Parse the JSON from the QR code
                        const parsedData = JSON.parse(data);
                        
                        // 2. Put ONLY the material name in the black pill
                        document.getElementById('scanned-data-text').innerText = parsedData.name || "Scanned Material";

                        // 3. Auto-fill all the visible form fields
                        if (parsedData.batch_number) document.getElementById('add-batch-number').value = parsedData.batch_number;
                        if (parsedData.category) document.getElementById('add-category').value = parsedData.category;
                        if (parsedData.quantity) document.querySelector('.input-qty').value = parsedData.quantity;
                        if (parsedData.unit) document.querySelector('.input-units').value = parsedData.unit.toLowerCase();
                        
                        const steppers = document.querySelectorAll('.stepper-row input');
                        if (parsedData.min_threshold && steppers[0]) steppers[0].value = parsedData.min_threshold;
                        if (parsedData.max_capacity && steppers[1]) steppers[1].value = parsedData.max_capacity;

                        if (parsedData.supplier_name) document.getElementById('add-supplier-name').value = parsedData.supplier_name;
                        if (parsedData.supplier_city) document.getElementById('add-supplier-city').value = parsedData.supplier_city;
                        if (parsedData.supplier_email) document.getElementById('add-supplier-email').value = parsedData.supplier_email;
                        
                    } catch (e) {
                        // Fallback: If it's a plain-text QR code, just show the raw text
                        document.getElementById('scanned-data-text').innerText = data;
                    }
                }
            }
        });
    </script>
</body>
</html>
