<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Quick Allot (Step 1)</title>
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/quick-allot.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

    <main class="app-container quick-allot-container">
        
        <header class="top-header">
            <div class="header-left">
                <div class="header-logo"><a href="im-dashboard.html"><img src="assets/small-logo.svg" alt="Logo" class="logo-img"> <span class="logo-text">IM</span></a></div>
            </div>
            <div class="header-right"><img src="assets/bell-icon.svg" alt="Notifications" class="icon-sm" onclick="window.location.href='im-alerts.html'"></div>
        </header>

        <div class="page-content">
            <div class="stepper-wrapper">
                <div class="stepper-track"><div class="stepper-fill" style="width: 33%;"></div></div>
                <div class="stepper-nodes">
                    <div class="step-node active">1</div>
                    <div class="step-node">2</div>
                    <div class="step-node">3</div>
                </div>
            </div>

            <div class="sub-header-left">
                <div class="back-btn-orange" onclick="window.location.href='im-dashboard.html'">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </div>
                <h1 class="page-title">Allot Material</h1>
            </div>

            <div class="scanner-wrapper">
                <div class="bracket top-left"></div><div class="bracket top-right"></div>
                <div class="bracket bottom-left"></div><div class="bracket bottom-right"></div>
                <div id="reader"></div>
            </div>

            <p class="scan-instructions">Scan the QR label to add<br>product to stock</p>

            <div class="action-buttons">
                <button class="btn-dark" id="upload-btn">
                    Upload From Gallery
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </button>
                <input type="file" id="qr-upload-input" accept="image/*" style="display: none;">
                <a href="create-kit.html" class="add-manually-link">Add Manually</a>
            </div>
            <div style="height: 100px;"></div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='im-dashboard.html'"><img src="assets/home-icon.svg" alt="Home"></div>
            <div class="nav-item active" onclick="window.location.href='quick-allot.html'"><img src="assets/nav-quick-allot.svg" alt="Quick Allot" style="filter: brightness(0) invert(1);"></div>
            <div class="nav-item" onclick="window.location.href='scanned-product.html'"><img src="assets/nav-scan-box.svg" alt="Scan"></div>
            <div class="nav-item" onclick="window.location.href='inventory.html'"><img src="assets/nav-inventory.svg" alt="Inventory"></div>
        </nav>

    </main>

    <script src="js/core.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const html5QrCode = new Html5Qrcode("reader");
            
            // Navigate to Create Kit and pass the scanned data in the URL
            const processScan = (text) => {
                html5QrCode.stop().then(() => {
                    window.location.href = `create-kit.html?data=${encodeURIComponent(text)}`;
                }).catch(err => {
                    window.location.href = `create-kit.html?data=${encodeURIComponent(text)}`;
                });
            };

            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 }, processScan)
                .catch(err => console.log("Camera init failed."));

            document.getElementById('upload-btn').addEventListener('click', () => document.getElementById('qr-upload-input').click());
            document.getElementById('qr-upload-input').addEventListener('change', e => {
                if (e.target.files.length > 0) {
                    html5QrCode.scanFile(e.target.files[0], true).then(processScan).catch(err => alert("No QR code found."));
                }
            });
        });
    </script>
</body>
</html>
