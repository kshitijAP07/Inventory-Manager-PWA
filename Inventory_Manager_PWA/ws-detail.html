<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Workstation Details</title>
    
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/ws-detail.css">
</head>
<body>

    <main class="app-container ws-detail-container">
        
        <header class="top-header">
            <div class="header-left">
                <div class="header-logo">
                    <a href="im-dashboard.html">
                        <img src="assets/small-logo.svg" alt="Logo" class="logo-img"> 
                        <span class="logo-text">IM</span>
                    </a>
                </div>
            </div>
            <div class="header-right">
                <img src="assets/bell-icon.svg" alt="Notifications" class="icon-sm" onclick="window.location.href='im-alerts.html'">
            </div>
        </header>

        <div class="page-content">
            
            <div class="detail-sub-header">
                <div class="back-btn" onclick="window.location.href='im-dashboard.html'">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </div>
                <div class="detail-title-block">
                    <h2 id="ws-code">Loading...</h2>
                    <p id="ws-name">Fetching details</p>
                </div>
                <div id="ws-status" class="status-badge status-active">...</div>
            </div>

            <div class="progress-box-container">
                <div id="ws-progress-ring" class="large-progress-ring" style="--progress: 0deg;">
                    <span class="progress-value"><span id="ws-progress-val">0</span><span class="percent-sign">%</span></span>
                </div>
            </div>

            <h3 class="section-title">Recent Allotments</h3>

            <div id="ws-tasks-list" class="task-list">
                </div>

            <div style="height: 100px;"></div>
        </div>

       
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="window.location.href='im-dashboard.html'">
                <img src="assets/home-icon.svg" alt="Home" style="filter: brightness(0) invert(1);">
            </div>
            <div class="nav-item" onclick="window.location.href='quick-allot.html'"><img src="assets/nav-quick-allot.svg" alt="Quick Allot"></div>
            <div class="nav-item" onclick="window.location.href='scanned-product.html'"><img src="assets/nav-scan-box.svg" alt="Scan"></div>
            <div class="nav-item" onclick="window.location.href='inventory.html'"><img src="assets/nav-inventory.svg" alt="Inventory"></div>
        </nav>

     </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>

    <script src="js/core.js"></script>
    <script src="js/pages/ws-detail.js"></script>
</body>
</html>
