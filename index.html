<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Login Gateway</title>
    <meta name="description" content="IM Platform - Role-based login">

    <meta name="theme-color" content="#FF631C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="IM">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./MANAGER_PWA/css/brand.css">
    <link rel="stylesheet" href="./MANAGER_PWA/css/core.css">
    <link rel="stylesheet" href="./MANAGER_PWA/css/pages/login-page.css">
</head>
<body>

    <div class="app-container">
        <main class="login-wrapper">
            
            <div class="logo-container">
                <img src="./MANAGER_PWA/assets/logo.svg" alt="IM Logo" class="logo-icon">
                <h1 class="logo-text">IM</h1>
            </div>

            <form class="login-form" id="loginForm">
                <input type="email" id="emailInput" class="input-field" placeholder="Email" required autocomplete="username">
                <input type="password" id="passwordInput" class="input-field" placeholder="Password" required autocomplete="current-password">
                
                <p id="errorMessage" style="color: #ff4d4d; display: none; text-align: center; margin-top: 10px; font-size: 14px;"></p>
                
                <button type="submit" class="btn-primary" id="loginBtn">Login</button>
            </form>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        // Check if already logged in -> auto-redirect
        (async () => {
            const user = await IMAuth.getCurrentUser();
            if (user && user.role) {
                window.location.href = IMAuth.getRedirectForRole(user.role);
            }
        })();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Reset
            errorMessage.style.display = 'none';
            loginBtn.textContent = 'Authenticating...';
            loginBtn.disabled = true;

            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            // Authenticate with Supabase via auth.js
            const { user, role, error } = await IMAuth.login(email, password);

            if (error || !role) {
                // Show error
                errorMessage.textContent = error || 'Login failed. Please try again.';
                errorMessage.style.display = 'block';
                loginBtn.textContent = 'Login';
                loginBtn.disabled = false;
                return;
            }

            // Success! Route based on RBAC logic
            loginBtn.textContent = 'Success! Redirecting...';
            setTimeout(() => {
                window.location.href = IMAuth.getRedirectForRole(role);
            }, 600);
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch((error) => console.error('[PWA] Service Worker registration failed:', error));
            });
        }
    </script>
</body>
</html>
