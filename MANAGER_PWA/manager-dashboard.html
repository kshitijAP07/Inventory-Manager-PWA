<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Manager Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/manager-dashboard.css">
</head>
<body>

    <div class="app-container">
        <main class="dashboard-wrapper">
            
            <header class="top-header">
                <div class="header-logo" onclick="window.location.href='manager-dashboard.html'" style="cursor: pointer;">
                    <img src="assets/small-logo.svg" alt="Logo" style="width: 24px;"> IM
                </div>
                
                <div style="display: flex; align-items: center; gap: 16px;">
                    <img src="assets/bell-icon.svg" alt="Notifications" onclick="window.location.href='alerts.html'" style="cursor: pointer;">
                    <button id="logoutBtn" style="background: none; border: none; color: #FF1744; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 14px;">Logout</button>
                </div>
            </header>

            <section class="time-filters">
                <div class="filter-pill active" data-filter="today">Today</div>
                <div class="filter-pill" data-filter="weekly">Weekly</div>
                <div class="filter-pill" data-filter="yearly">Yearly</div>
            </section>

            <section class="efficiency-card" style="--efficiency-ratio: 0.85;">
                <div class="efficiency-data">
                    <span>Efficiency</span>
                    <h2 id="overall-efficiency">85%</h2>
                </div>
                <div class="efficiency-remainder"></div>
            </section>

            <div>
                <span class="section-title">Graph</span>
                
                <div class="custom-dropdown" id="graph-filter">
                    <div class="dropdown-trigger">
                        <span class="dropdown-value">Workstations</span>
                        <svg class="dropdown-arrow" width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M7 10l5 5 5-5z"/></svg>
                    </div>
                    <ul class="dropdown-menu">
                        <li class="dropdown-item active" data-value="workstations">Workstations</li>
                        <li class="dropdown-item" data-value="assembly">Assembly Unit</li>
                    </ul>
                </div>
            </div>
            
            <section class="graph-container">
                <img src="assets/main-graph.svg" alt="Main Workstation Graph" style="width: 100%; max-width: 280px;">
                
                <p class="graph-caption">
                    This represents the progress of every individual Workstation.
                </p>
            </section>

            <span class="section-title">Workstations</span>
            <section class="cards-grid" id="workstations-grid">
                </section>

            <span class="section-title">Assembly Line</span>
            <section class="cards-grid" id="assembly-grid">
                </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="window.location.href='manager-dashboard.html'">
                <img src="assets/home-icon.svg" alt="Home" style="filter: brightness(0) invert(1);"> 
            </div>
            
            <div class="nav-item" onclick="window.location.href='quick-allot.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
            </div>

            <div class="nav-item" onclick="window.location.href='operators.html'">
                <img src="assets/operator-icon.svg" alt="Operators">
            </div>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>

    <script src="js/pages/manager-dashboard.js"></script>
</body>
</html>
