<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Alerts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/alerts.css">
</head>
<body>

    <div class="app-container">
        <main class="alerts-wrapper">
            
            <header class="top-header">
                <div class="header-logo" onclick="window.location.href='manager-dashboard.html'" style="cursor: pointer;">
                    <img src="assets/small-logo.svg" alt="Logo" style="width: 24px;"> IM
                </div>
                <img src="assets/bell-icon.svg" alt="Notifications" class="bell-alert">
            </header>

            <span class="alerts-title">3 Alerts !</span>

            <section class="alerts-list">
                
                <div class="alert-card">
                    <div class="alert-icon-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="#FFC400" stroke="#FFC400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2l9.5 6.5-3.5 11h-12l-3.5-11z"></path>
                        </svg>
                    </div>
                    <div class="alert-content">
                        <div class="alert-header">
                            <span class="alert-id">WS-04</span>
                            <span class="alert-time">09:55</span>
                        </div>
                        <h3 class="alert-main-title">WS-04 is on Hold</h3>
                        <p class="alert-desc">
                            28 units remaining · min threshold 80<br>
                            WS-04 Earphone Build is blocked
                        </p>
                        <div class="alert-actions">
                            <button class="btn-action">Check Stock &rarr;</button>
                            <button class="btn-action">Raise Order &rarr;</button>
                        </div>
                    </div>
                </div>

                <div class="alert-card">
                    <div class="alert-icon-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF1744" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                            <line x1="12" y1="9" x2="12" y2="13"></line>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                    </div>
                    <div class="alert-content">
                        <div class="alert-header">
                            <span class="alert-id">WS-02</span>
                            <span class="alert-time">08:30</span>
                        </div>
                        <h3 class="alert-main-title">Driver Brackets — Critical Low</h3>
                        <p class="alert-desc">19 units remaining · min threshold 50</p>
                        <div class="alert-actions">
                            <button class="btn-action">Inform Inventory Manager &rarr;</button>
                        </div>
                    </div>
                </div>

                <div class="alert-card">
                    <div class="alert-icon-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF1744" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                            <line x1="12" y1="9" x2="12" y2="13"></line>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                    </div>
                    <div class="alert-content">
                        <div class="alert-header">
                            <span class="alert-id">AL-01</span>
                            <span class="alert-time">10.05</span>
                        </div>
                        <h3 class="alert-main-title">Foam Dampening — Warning</h3>
                        <p class="alert-desc">55 units · reorder point is 80</p>
                        <div class="alert-actions">
                            <button class="btn-action">Raise Order &rarr;</button>
                        </div>
                    </div>
                </div>

            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="window.location.href='manager-dashboard.html'">
                <img src="assets/home-icon.svg" alt="Home" style="filter: brightness(0) invert(1);"> 
            </div>
            
            <div class="nav-item" onclick="window.location.href='quick-allot.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
            </div>

            <div class="nav-item" onclick="window.location.href='operators.html'">
                <img src="assets/operator-icon.svg" alt="Operators">
            </div>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="js/pages/alerts.js"></script>
</body>
</html>
