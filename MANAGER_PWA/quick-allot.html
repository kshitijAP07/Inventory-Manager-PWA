<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IM - Quick Allot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/quick-allot.css">
</head>
<body>

    <div class="app-container">
        <main class="allot-wrapper">
            
            <header class="top-header">
                <div class="header-logo" onclick="window.location.href='manager-dashboard.html'" style="cursor: pointer;">
                    <img src="assets/small-logo.svg" alt="Logo" style="width: 24px;"> IM
                </div>
                <img src="assets/bell-icon.svg" alt="Notifications" onclick="window.location.href='alerts.html'" style="cursor: pointer;">
            </header>

            <span class="section-title">Quick Allot</span>

            <!-- WS / AL Toggle -->
            <div class="station-toggle" id="stationToggle">
                <button class="toggle-pill active" data-mode="ws">WS</button>
                <button class="toggle-pill" data-mode="al">AL</button>
            </div>
            
            <form class="allot-form" id="allotForm" onsubmit="event.preventDefault();">
                <select class="form-select" id="stationSelect">
                    <option value="" disabled selected hidden>Select Station</option>
                </select>

                <select class="form-select" id="operatorSelect">
                    <option value="" disabled selected hidden>Select Operator</option>
                </select>

                <input type="text" class="form-input" id="taskInput" placeholder="Task">
                
                <textarea class="form-textarea" id="descInput" placeholder="Description"></textarea>
                
                <div class="time-row">
                    <select class="form-select" id="hoursSelect">
                        <option value="" disabled selected hidden>Hours</option>
                        <option value="1">1 Hour</option>
                        <option value="2">2 Hours</option>
                        <option value="3">3 Hours</option>
                        <option value="4">4 Hours</option>
                    </select>
                    <select class="form-select" id="minutesSelect">
                        <option value="" disabled selected hidden>Minutes</option>
                        <option value="15">15 Mins</option>
                        <option value="30">30 Mins</option>
                        <option value="45">45 Mins</option>
                    </select>
                </div>
            </form>

            <button type="button" class="btn-submit" id="submitBtn">Allot To Station</button>

            <span class="section-title">Recent Allotments</span>
            <section class="allotments-list">
                <!-- Dynamically populated by quick-allot.js -->
            </section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="window.location.href='manager-dashboard.html'">
                <img src="assets/home-icon.svg" alt="Home"> 
            </div>
            
            <div class="nav-item active" onclick="window.location.href='quick-allot.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
            </div>

            <div class="nav-item" onclick="window.location.href='operators.html'">
                <img src="assets/operator-icon.svg" alt="Operators">
            </div>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="js/pages/quick-allot.js"></script>
</body>
</html>
