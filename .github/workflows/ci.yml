name: CI

on:
  push:
    branches: [ "**" ]        # every branch every teammate pushes
  pull_request:
    branches: [ main ]        # extra check before merging to main

jobs:
  lint:
    name: Lint check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        run: npm install eslint --save-dev

      - name: Run ESLint
        run: npx eslint src/ app.js --ext .js

  validate-pwa:
    name: Validate PWA files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check manifest exists
        run: test -f public/manifest.json && echo "manifest.json found" || exit 1

      - name: Check service worker exists
        run: test -f public/sw.js && echo "sw.js found" || exit 1

      - name: Check index.html exists
        run: test -f index.html && echo "index.html found" || exit 1

      - name: Validate manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('public/manifest.json','utf8')); console.log('manifest.json is valid JSON')"