<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Operator - Reject Task</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/brand.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/pages/home.css">
    <style>
        .reject-input {
            background-color: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: #FFFFFF;
            font-family: inherit;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 16px;
        }
        .reject-input::placeholder { color: rgba(255, 255, 255, 0.7); }
        .reject-btn {
            background-color: #FFFFFF;
            color: var(--color-primary);
            border: none;
            border-radius: 24px;
            padding: 14px 32px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            transition: transform 0.1s ease;
        }
        .reject-btn:active { transform: scale(0.96); }
        .back-circle {
            background: #FFFFFF; color: var(--color-primary); width: 36px; height: 36px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
    </style>
</head>
<body style="background-color: var(--color-primary);">

    <main class="app-container operator-home-container" style="height: 100vh; overflow: hidden;">
        
        <header class="top-header">
            <div class="header-left">
                <div class="header-logo">
                    <img src="assets/small-logo.svg" alt="Logo" class="logo-img filter-white"> 
                    <span class="logo-text">IM</span>
                </div>
            </div>
            <div class="header-right">
                <img src="assets/bell-icon.svg" alt="Notifications" class="icon-sm filter-white">
            </div>
        </header>

        <div class="page-content">
            <div style="display: flex; align-items: center; gap: 16px; margin-top: 24px; margin-bottom: 32px;">
                <div class="back-circle" onclick="window.history.back()">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </div>
                <h2 style="font-size: 18px; margin: 0; font-weight: 700;">Reason For Rejection</h2>
            </div>

            <input type="text" id="rej-reason" class="reject-input" placeholder="Reason">
            <textarea id="rej-desc" class="reject-input" placeholder="Description" rows="4" style="resize: none;"></textarea>

            <button id="submit-rejection" class="reject-btn">Raise Issue</button>
        </div>

        <nav class="floating-bottom-nav">
            <div class="nav-item active" onclick="window.location.href='home.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-icon-svg">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </div>
        </nav>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="js/core.js"></script>
    <script src="js/pages/reject-task.js"></script>
</body>
</html>
